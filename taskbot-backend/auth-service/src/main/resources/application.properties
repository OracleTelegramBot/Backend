spring.application.name=auth-service

# Oracle Wallet Configuration
oracle.wallet.path=FULL_PATH
# Database Connection - Oracle with Wallet
spring.datasource.url=jdbc:oracle:thin:@basegestiondetareas_tp?TNS_ADMIN=${oracle.wallet.path}
spring.datasource.username=USER
spring.datasource.password=PASSWORD
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=false

# Server Configuration
server.port=8082
server.forward-headers-strategy=framework

# Security Configuration
jwt.secret=your_secret_key_here_change_in_production_environment
jwt.expiration=86400000

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=method
