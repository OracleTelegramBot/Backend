version: '3.3'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    networks:
      - broker-kafka
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    networks:
      - broker-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    restart: unless-stopped
    networks:
      - broker-kafka
    depends_on:
      - kafka
    ports:
      - "19000:9000"
    environment:
      KAFKA_BROKERCONNECT: ${KAFKA_BROKERCONNECT}

  auth-service:
    build: 
      context: ./auth-service
    container_name: auth-service
    restart: on-failure
    networks:
      - broker-kafka
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - TNS_ADMIN=${TNS_ADMIN}
      - ORACLE_WALLET_PATH=${ORACLE_WALLET_PATH}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./Wallet:/app/Wallet

  kpi-service:
    build: 
      context: ./kpi-service
    container_name: kpi-service
    restart: on-failure
    networks:
      - broker-kafka
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - TNS_ADMIN=${TNS_ADMIN}
      - ORACLE_WALLET_PATH=${ORACLE_WALLET_PATH}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./Wallet:/app/Wallet

  ai-service:
    build:
      context: ./ai-service
    container_name: ai-service
    restart: on-failure
    networks:
      - broker-kafka
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - TNS_ADMIN=${TNS_ADMIN}
      - ORACLE_WALLET_PATH=${ORACLE_WALLET_PATH}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_MODEL=${GEMINI_API_MODEL}
    volumes:
      - ./Wallet:/app/Wallet

  telegram-service:
    build: 
      context: ./telegram-service
    container_name: telegram-service
    restart: on-failure
    networks:
      - broker-kafka
    depends_on:
      - kafka
      - kpi-service
      - auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - FEIGN_CLIENT_CONFIG_KPI_SERVICE_URL=${FEIGN_CLIENT_CONFIG_KPI_SERVICE_URL}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - ORACLE_WALLET_PATH=${ORACLE_WALLET_PATH}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}

  task-service:
      build:
        context: ./task-service
      container_name: task-service
      restart: on-failure
      networks:
        - broker-kafka
      depends_on:
        - kpi-service
      ports:
        - "8084:8084"
      environment:
        - SPRING_DATASOURCE_URL=${DB_URL}
        - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
        - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
        - TNS_ADMIN=${TNS_ADMIN}
        - ORACLE_WALLET_PATH=${ORACLE_WALLET_PATH}
        - KPI_SERVICE_URL=${KPI_SERVICE_URL}
        - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      volumes:
        - ./Wallet:/app/Wallet

networks:
  broker-kafka:
    driver: bridge
