spring.application.name=telegram

# URL del primer microservicio (KPIs)
feign.client.config.kpi-service.url=http://localhost:8080

# Token del bot
telegram.bot.token=TOKEN

# Puerto que utiliza el microservicio de Telegram
server.port=8081

# Kafka Producer Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

auth.service.url=http://localhost:8082
